<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solo Administradores</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0F1420;
    --surface: #161C2C;
    --surfaceAlt: #1D2436;
    --border: #2A3247;
    --text: #E8EAF0;
    --muted: #8B93A7;
    --amber: #E8A23D;
    --red: #D9554F;
    --teal: #3FA796;
    --violet: #7C6FE0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }
  ::selection { background: #7C6FE055; }
  :focus-visible { outline: 2px solid var(--violet); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }

  .hidden { display: none !important; }

  .container-narrow { max-width: 880px; margin: 0 auto; padding: 28px 18px 60px; }
  .container-wide { max-width: 920px; margin: 0 auto; padding: 28px 18px 60px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .card.clickable { cursor: pointer; }
  .mb-12 { margin-bottom: 12px; }
  .mb-24 { margin-bottom: 24px; }

  .empty {
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 32px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13.5px;
  }

  .field { display: block; margin-bottom: 14px; }
  .field-label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .input {
    width: 100%;
    background: var(--surfaceAlt);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    box-sizing: border-box;
  }
  textarea.input { resize: vertical; font-family: 'Inter', sans-serif; }

  .btn {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13.5px;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: filter 0.15s;
    border: 1px solid transparent;
  }
  .btn:hover:not(:disabled) { filter: brightness(1.12); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--violet); color: #fff; }
  .btn-ghost { background: transparent; color: var(--text); border-color: var(--border); }
  .btn-approve { background: #3FA7961A; color: var(--teal); border-color: #3FA79655; }
  .btn-reject { background: #D9554F1A; color: var(--red); border-color: #D9554F55; }
  .btn-full { width: 100%; justify-content: center; }
  .btn-whatsapp { background: #25D366; color: #fff; }

  .status-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    display: inline-block;
  }
  .status-pending { color: var(--amber); border: 1px solid #E8A23D55; background: #E8A23D14; }
  .status-approved { color: var(--teal); border: 1px solid #3FA79655; background: #3FA79614; }
  .status-rejected { color: var(--muted); border: 1px solid #8B93A755; background: #8B93A714; }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13.5px;
    z-index: 50;
    max-width: 90%;
    text-align: center;
  }
  .toast-info { background: #3FA79622; border: 1px solid #3FA79666; }
  .toast-error { background: #D9554F22; border: 1px solid #D9554F66; }

  .spin { animation: spin 0.8s linear infinite; display: inline-block; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  a { color: var(--violet); }

  /* GATE screen */
  .gate-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 48px 24px; }
  .gate-eyebrow { display: inline-flex; align-items: center; gap: 8px; color: var(--violet); font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.1em; margin-bottom: 10px; }
  .gate-title { font-family: 'Space Grotesk', sans-serif; font-size: 36px; font-weight: 700; margin: 0; text-align: center; }
  .gate-sub { color: var(--muted); font-size: 14px; max-width: 360px; margin: 10px auto 0; text-align: center; }
  .gate-cards { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-top: 36px; }
  .gate-card { width: 260px; }
  .gate-card-title { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 16px; margin: 10px 0 4px; }
  .gate-card-desc { color: var(--muted); font-size: 13px; }
  .gate-card-cta { font-size: 13px; margin-top: 12px; display: flex; align-items: center; gap: 4px; }

  .gate-info { width: 100%; max-width: 640px; margin-top: 56px; }
  .gate-info-block { margin-bottom: 28px; }
  .gate-info-title { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .gate-info-text { color: var(--muted); font-size: 13.5px; line-height: 1.6; }
  .gate-info-text p { margin: 0 0 10px; }
  .gate-info-text p:last-child { margin-bottom: 0; }
  .gate-rules-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
  .gate-rules-list li { display: flex; gap: 10px; font-size: 13.5px; color: var(--muted); line-height: 1.5; }
  .gate-rules-list .rule-num { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--violet); flex-shrink: 0; padding-top: 1px; }

  /* Auth */
  .center-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .back-link { color: var(--muted); font-size: 12.5px; cursor: pointer; margin-bottom: 16px; }
  .panel-title { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 18px; margin-bottom: 16px; }
  .tabs-pill { display: flex; gap: 6px; margin-bottom: 20px; background: var(--surfaceAlt); padding: 4px; border-radius: 8px; }
  .tab-pill-btn { flex: 1; padding: 8px 0; border-radius: 6px; border: none; background: transparent; color: var(--muted); font-weight: 600; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; }
  .tab-pill-btn.active { background: var(--violet); color: #fff; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Dashboard header / tabs */
  .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 10px; }
  .dash-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.08em; }
  .dash-title { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; }
  .tabs-underline { display: flex; gap: 8px; margin-bottom: 22px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .tab-underline-btn {
    background: none; border: none; padding: 10px 4px; margin-right: 18px;
    color: var(--muted); border-bottom: 2px solid transparent;
    font-weight: 600; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; font-family: 'Inter', sans-serif;

  .tab-underline-btn.active { color: var(--text); border-bottom-color: var(--violet); }
  .tab-underline-btn.active.amber { border-bottom-color: var(--amber); }

  .section-title { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 15px; margin: 26px 0 10px; display: flex; align-items: center; gap: 6px; }
  .section-title:first-child { margin-top: 0; }

  /* report card */
  .report-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .report-alias { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 16px; }
  .report-meta { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .report-desc { font-size: 13.5px; color: var(--text); line-height: 1.5; margin-bottom: 10px; }
  .report-row { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12.5px; color: var(--muted); }
  .report-row .mono { font-family: 'JetBrains Mono', monospace; color: var(--text); }
  .evidence-editor { display: flex; gap: 6px; margin-top: 10px; }
  .evidence-editor .input { font-size: 12.5px; padding: 7px 10px; }
  .report-actions { display: flex; gap: 8px; margin-top: 14px; }

  /* admin request card */
  .admin-card-row { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .admin-card-actions { display: flex; gap: 8px; align-items: flex-start; }

  /* Map */
  .map-wrap {
    background-color: var(--surfaceAlt);
    background-image: radial-gradient(circle at 1px 1px, #232b3f 1px, transparent 0);
    background-size: 18px 18px;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .map-legend { display: flex; gap: 18px; padding: 10px 16px; border-top: 1px solid var(--border); font-size: 11.5px; color: var(--muted); font-family: 'JetBrains Mono', monospace; flex-wrap: wrap; }

  .info-line { display: flex; gap: 8px; align-items: center; color: var(--muted); font-size: 12.5px; margin-bottom: 12px; }

  @media (max-width: 480px) {
    .grid-2 { grid-template-columns: 1fr; }
    .gate-title { font-size: 28px; }
  }
</style>

/* ════════════════════════════════════════════════════════════════════════
   FIRESTORE HELPERS
═══════════════════════════════════════════════════════════════════════ */
async function getDocData(col, id) {
  const snap = await db.collection(col).doc(id).get();
  return snap.exists ? snap.data() : null;
}
async function getCollectionData(col) {
  try {
    const snap = await db.collection(col).get();
    return snap.docs.map((d) => d.data());
  } catch (err) {
    console.error(`Error leyendo colección "${col}":`, err);
    flash("No se pudo cargar la información. " + friendlyFirebaseError(err), "error");
    return [];
  }
}
function friendlyFirebaseError(err) {
  const code = err && err.code ? err.code : "";
  if (code === "permission-denied") {
    return "Firestore rechazó el acceso (permission-denied). Revisá las reglas de seguridad en Firebase Console → Firestore Database → Reglas.";
  }
  if (code === "unavailable") {
    return "No hay conexión con Firebase. Revisá tu internet.";
  }
  return (err && err.message) ? err.message : String(err);
}
async function saveDoc(col, id, data) {
  await db.collection(col).doc(id).set(data);
}
async function patchDoc(col, id, partial) {
  await db.collection(col).doc(id).update(partial);
}

  authView: "login",

  justRegistered: null,

  justReported: null,
};

function flash(text, type = "info") {
  state.msg = { text, type };
  render();
  setTimeout(() => {
    state.msg = null;
    render();
  }, 4000);
}

async function refreshAll() {
  const [a, r] = await Promise.all([getCollectionData("admins"), getCollectionData("reports")]);
  state.admins = a;
  state.reports = r.sort((x, y) => y.createdAt - x.createdAt);
  render();
}

/* ════════════════════════════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════════════════════════ */
async function handleRegister(e) {
  e.preventDefault();
  const f = state.regForm;
  if (!f.username || !f.password || !f.community) {
    flash("Completá todos los campos.", "error");
    return;
  }
  state.loading = true;
  render();
  try {
    const existing = await getDocData("admins", f.username);
    if (existing) {
      state.loading = false;
      flash("Ese nombre de usuario ya existe.", "error");
      render();
      return;
    }
    const record = { ...f, evidenceLink: "", status: "pending", createdAt: Date.now() };
    await saveDoc("admins", f.username, record);
    state.loading = false;
    state.justRegistered = {
      username: f.username,
      community: f.community,
      link: whatsappLink(`Hola, soy ${f.username} y quiero registrarme como administrador del grupo "${f.community}" en Solo Administradores. Te adjunto la captura que prueba que soy admin.`),
    };
    state.regForm = { username: "", password: "", community: "" };
    await refreshAll();
  } catch (err) {
    state.loading = false;
    console.error("Error al registrar:", err);
    flash(friendlyFirebaseError(err), "error");
    render();
  }
}

async function handleLogin(e) {
  e.preventDefault();
  state.loading = true;
  render();
  try {
    const f = state.loginForm;
    const record = await getDocData("admins", f.username);
    state.loading = false;
    if (!record) { flash("Usuario no encontrado.", "error"); render(); return; }
    if (record.password !== f.password) { flash("Contraseña incorrecta.", "error"); render(); return; }
    if (record.status === "pending") { flash("Tu registro todavía está pendiente de aprobación.", "error"); render(); return; }
    if (record.status === "rejected") { flash("Tu solicitud fue rechazada.", "error"); render(); return; }
    state.currentUser = record;
    state.screen = "dashboard";
    await refreshAll();
  } catch (err) {
    state.loading = false;
    console.error("Error al iniciar sesión:", err);
    flash(friendlyFirebaseError(err), "error");
    render();
  }
}

async function handleOwnerAuth(e) {
  e.preventDefault();
  if (state.ownerPwInput === OWNER_PASSWORD) {
    state.screen = "owner";
    state.ownerPwInput = "";
    await refreshAll();

    flash("Contraseña de propietario incorrecta.", "error");

}

async function handleSubmitReport(e) {
  e.preventDefault();
  const f = state.reportForm;
  if (!f.phone || !f.alias || !f.community || !f.description) {
    flash("Completá teléfono, alias, comunidad y descripción.", "error");
    return;
  }
  state.loading = true;
  render();
  try {
    const id = `${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
    const record = { id, ...f, evidenceLink: "", submittedBy: state.currentUser.username, status: "pending", createdAt: Date.now() };
    await saveDoc("reports", id, record);
    state.loading = false;
    state.justReported = {
      shortId: id,
      link: whatsappLink(`Reporte ${id} — enviado por ${state.currentUser.username}. Alias reportado: ${f.alias}. Comunidad: ${f.community}. Te adjunto las pruebas.`),
    };
    state.reportForm = { phone: "", alias: "", community: "", description: "" };
    await refreshAll();
  } catch (err) {
    state.loading = false;
    console.error("Error al enviar reporte:", err);
    flash(friendlyFirebaseError(err), "error");
    render();
  }
}

function esc(str) {
  if (str === undefined || str === null) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function statusChip(status) {

  const s = map[status] || map.pending;
  return `<span class="status-chip ${s.cls}">${s.label}</span>`;
}

/* ── concept map (SVG) ── */
function conceptMapHtml(reports, showPending) {
  const list = reports.filter((r) => (showPending ? r.status !== "rejected" : r.status === "approved"));
  if (list.length === 0) {
    return emptyHtml("Todavía no hay reportes aprobados para mostrar en el mapa. Cuando se aprueben, las conexiones aparecen acá.");
  }
  const communities = [...new Set(list.map((r) => r.community || "Sin comunidad"))];
  const W = 800, H = 560, cx = W / 2, cy = H / 2, R1 = Math.min(W, H) * 0.33;
  const hubs = communities.map((name, i) => {
    const angle = (2 * Math.PI * i) / communities.length - Math.PI / 2;
    return { name, x: cx + R1 * Math.cos(angle), y: cy + R1 * Math.sin(angle) };
  });
  const nodes = [];
  hubs.forEach((hub) => {
    const people = list.filter((r) => (r.community || "Sin comunidad") === hub.name);
    const R2 = 95;
    people.forEach((p, j) => {
      const angle = (2 * Math.PI * j) / Math.max(people.length, 1);
      nodes.push({ ...p, x: hub.x + R2 * Math.cos(angle), y: hub.y + R2 * Math.sin(angle), hub });
    });
  });

  const lines1 = hubs.map((h) => `<line x1="${cx}" y1="${cy}" x2="${h.x}" y2="${h.y}" stroke="#2A3247" stroke-width="1"/>`).join("");
  const lines2 = nodes.map((n) => `<line x1="${n.hub.x}" y1="${n.hub.y}" x2="${n.x}" y2="${n.y}" stroke="${n.status === "pending" ? "#E8A23D66" : "#D9554F66"}" stroke-width="1.25"/>`).join("");
  const hubCircles = hubs.map((h) => `
    <g>
      <circle cx="${h.x}" cy="${h.y}" r="16" fill="#7C6FE0" stroke="#0F1420" stroke-width="2"/>
      <text x="${h.x}" y="${h.y - 22}" text-anchor="middle" fill="#E8EAF0" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600">${esc(h.name)}</text>
    </g>
  `).join("");
  const nodeCircles = nodes.map((n) => `
    <g>
      <circle cx="${n.x}" cy="${n.y}" r="9" fill="${n.status === "pending" ? "#E8A23D" : "#D9554F"}" stroke="#0F1420" stroke-width="1.5"/>
      <text x="${n.x}" y="${n.y + 20}" text-anchor="middle" fill="#8B93A7" font-family="'JetBrains Mono', monospace" font-size="10">${esc(n.alias)}</text>
    </g>
  `).join("");

  return `
    <div class="map-wrap">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;">
        ${lines1}
        ${lines2}
        <circle cx="${cx}" cy="${cy}" r="8" fill="#E8EAF0" opacity="0.8"/>
        ${hubCircles}
        ${nodeCircles}
      </svg>
      <div class="map-legend">
        <span><span style="color:var(--violet)">●</span> comunidad</span>
        <span><span style="color:var(--red)">●</span> persona reportada (aprobado)</span>
        ${showPending ? `<span><span style="color:var(--amber)">●</span> pendiente de revisión</span>` : ""}
      </div>
    </div>
  `;
}

      ${pendingReports.length === 0 ? emptyHtml("No hay reportes pendientes.") : pendingReports.map((r) => reportCardHtml(r, { showActions: true, showEvidenceEditor: true })).join("")}
      ${decidedReports.length > 0 ? `
        <div class="section-title">Historial (${decidedReports.length})</div>
        ${decidedReports.map((r) => reportCardHtml(r)).join("")}
      ` : ""}
    `;
  } else if (state.ownerTab === "mapa") {
    content = `
      <div class="info-line">${ICONS.info} Incluye reportes pendientes (ámbar) y aprobados (rojo). Los rechazados no se muestran.</div>
      ${conceptMapHtml(state.reports, true)}
    `;
  }

  return `
    <div class="container-wide">
      <div class="dash-header">
        <div>
          <div class="dash-eyebrow" style="color:var(--amber);">SOLO ADMINISTRADORES · PROPIETARIO</div>
          <div class="dash-title">Panel de control</div>
        </div>
        <button class="btn btn-ghost" id="owner-exit-btn">${ICONS.logOut} Salir</button>
      </div>
      ${tabsHtml}
      ${content}
    </div>
    ${toastHtml()}
  `;
}

/* ════════════════════════════════════════════════════════════════════════
   MAIN RENDER + EVENT BINDING
═══════════════════════════════════════════════════════════════════════ */
function render() {
  const root = document.getElementById("root");
  let html = "";
  if (state.screen === "gate") html = renderGate();
  else if (state.screen === "ownerAuth") html = renderOwnerAuth();
  else if (state.screen === "adminAuth") html = renderAdminAuth();
  else if (state.screen === "dashboard" && state.currentUser) html = renderDashboard();
  else if (state.screen === "owner") html = renderOwner();
  else html = `<div style="padding:40px;text-align:center;color:var(--muted);">Cargando…</div>`;

  root.innerHTML = html;
  bindEvents();
}

function bindEvents() {
  // navigation
  document.querySelectorAll("[data-go]").forEach((el) => {
    el.addEventListener("click", () => go(el.getAttribute("data-go")));
  });

  // auth view tabs
  document.querySelectorAll("[data-authview]").forEach((el) => {
    el.addEventListener("click", () => {
      state.authView = el.getAttribute("data-authview");
      state.justRegistered = null;
      render();
    });
  });

  // owner auth form
  const ownerForm = document.getElementById("owner-auth-form");
  if (ownerForm) {
    ownerForm.addEventListener("submit", handleOwnerAuth);
    document.getElementById("owner-pw-input").addEventListener("input", (e) => {
      state.ownerPwInput = e.target.value;
    });
  }

  // login form
  const loginForm = document.getElementById("login-form");
  if (loginForm) {
    loginForm.addEventListener("submit", handleLogin);
    document.getElementById("login-username").addEventListener("input", (e) => { state.loginForm.username = e.target.value; });
    document.getElementById("login-password").addEventListener("input", (e) => { state.loginForm.password = e.target.value; });
  }

  // register form
  const regForm = document.getElementById("register-form");
  if (regForm) {
    regForm.addEventListener("submit", handleRegister);
    document.getElementById("reg-username").addEventListener("input", (e) => { state.regForm.username = e.target.value; });
    document.getElementById("reg-password").addEventListener("input", (e) => { state.regForm.password = e.target.value; });
    document.getElementById("reg-community").addEventListener("input", (e) => { state.regForm.community = e.target.value; });
  }

  const goLoginAfterRegister = document.getElementById("go-login-after-register");
  if (goLoginAfterRegister) {
    goLoginAfterRegister.addEventListener("click", () => {
      state.justRegistered = null;
      state.authView = "login";
      render();
    });
  }

  // dashboard
  const logoutBtn = document.getElementById("logout-btn");
  if (logoutBtn) logoutBtn.addEventListener("click", logout);

  document.querySelectorAll("[data-dashtab]").forEach((el) => {
    el.addEventListener("click", () => {
      state.dashTab = el.getAttribute("data-dashtab");
      render();
    });
  });

  const reportForm = document.getElementById("report-form");
  if (reportForm) {
    reportForm.addEventListener("submit", handleSubmitReport);
    document.getElementById("report-phone").addEventListener("input", (e) => { state.reportForm.phone = e.target.value; });
    document.getElementById("report-alias").addEventListener("input", (e) => { state.reportForm.alias = e.target.value; });
    document.getElementById("report-community").addEventListener("input", (e) => { state.reportForm.community = e.target.value; });
    document.getElementById("report-description").addEventListener("input", (e) => { state.reportForm.description = e.target.value; });
  }

  const reportAnother = document.getElementById("report-another");
  if (reportAnother) {
    reportAnother.addEventListener("click", () => {
      state.justReported = null;
      render();
    });
  }

  document.querySelectorAll("[data-save-report-evidence]").forEach((el) => {
    el.addEventListener("click", () => {
      const id = el.getAttribute("data-save-report-evidence");
      const input = document.querySelector(`[data-evidence-input="${CSS.escape(id)}"]`);
      setReportEvidence(id, input.value);
    });
  });

  // owner panel
  const ownerExitBtn = document.getElementById("owner-exit-btn");
  if (ownerExitBtn) ownerExitBtn.addEventListener("click", () => go("gate"));

  document.querySelectorAll("[data-ownertab]").forEach((el) => {
    el.addEventListener("click", () => {
      state.ownerTab = el.getAttribute("data-ownertab");
      render();
    });
  });

  document.querySelectorAll("[data-approve-admin]").forEach((el) => {
    el.addEventListener("click", () => setAdminStatus(el.getAttribute("data-approve-admin"), "approved"));
  });
  document.querySelectorAll("[data-reject-admin]").forEach((el) => {
    el.addEventListener("click", () => setAdminStatus(el.getAttribute("data-reject-admin"), "rejected"));
  });
  document.querySelectorAll("[data-save-admin-evidence]").forEach((el) => {
    el.addEventListener("click", () => {
      const username = el.getAttribute("data-save-admin-evidence");
      const input = document.querySelector(`[data-admin-evidence-input="${CSS.escape(username)}"]`);
      setAdminEvidence(username, input.value);
    });
  });
  document.querySelectorAll("[data-approve-report]").forEach((el) => {
    el.addEventListener("click", () => setReportStatus(el.getAttribute("data-approve-report"), "approved"));
  });
  document.querySelectorAll("[data-reject-report]").forEach((el) => {
    el.addEventListener("click", () => setReportStatus(el.getAttribute("data-reject-report"), "rejected"));
  });
}

/* ════════════════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════════════ */
render();
refreshAll();
</script>
</body>
</html>
